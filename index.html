<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Multiple favicon formats for different browsers -->
    <link rel="icon" type="image/png" href="./portfolio-icon.png" />
    <link rel="icon" type="image/png" href="./public/favicon.png" />
    <link rel="shortcut icon" href="./public/favicon.ico" />
    <link rel="apple-touch-icon" href="./public/favicon.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <meta name="description" content="Sashank Punyamurthy - Software Engineer Portfolio showcasing projects and skills" />
    <meta name="theme-color" content="#445E4F" />
    <title>Sashank Punyamurthy | Software Engineer Portfolio</title>
    <!-- Set theme before first paint to avoid a light-mode flash -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        if (t ? t === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
